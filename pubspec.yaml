name: bat_locker

description: A secure, customizable password manager app with biometric and password authentication, categories, and image support.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.4.2
  path_provider: ^2.1.2
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1
  encrypt: ^5.0.1
  provider: ^6.0.5
  cryptography: ^2.5.0
  cupertino_icons: ^1.0.6
  google_fonts: ^8.1.0
  path: ^1.9.0
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/bat_logo.png
    - assets/icons/
    - assets/google_fonts/
  fonts:
    - family: Impact
      fonts:
        - asset: assets/fonts/impact.ttf

flutter_native_splash:
  color: "#DC000A"
  image: assets/images/bat_logo.png
  android: true
  ios: true
  web: false

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon.png"
  background_color: "#0B0B0B"